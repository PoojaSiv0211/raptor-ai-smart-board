name: raptor
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  youtube_player_iframe: ^5.1.3

  # ===== AI / Networking =====
  http: ^1.2.2
  provider: ^6.1.2
  connectivity_plus: ^6.0.5

  # ===== Local storage paths =====
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3

  # ===== Share exported files =====
  share_plus: ^10.0.2

  # ===== Optional: permissions for saving to Downloads/Gallery later =====
  permission_handler: ^11.3.1

  # ===== File upload + drag & drop (desktop) =====
  file_picker: ^8.1.2
  desktop_drop: ^0.5.0

  # ===== Session persistence (Hive) =====
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ===== Thumbnail compression =====
  flutter_image_compress: ^2.3.0

  # ===== Path helpers =====
  path: ^1.9.0

   # ===== WebView for 3D models (Android) =====
  webview_flutter: ^4.4.4
  webview_flutter_android: ^3.16.0

 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true